{{ define "main" }}
<main class="w-full h-screen bg-black overflow-hidden relative">
  <!-- 背景层 -->
  <div id="bg-layer" class="fixed inset-0 z-0 opacity-0 transition-opacity duration-1000 bg-cover bg-center">
    <div class="absolute inset-0 bg-gradient-to-r from-black/90 via-black/40 to-transparent"></div>
  </div>

  <!-- 主容器 Section -->
  <section class="relative w-full h-full z-10">
    
    <!-- 左侧/内容区域：这里放置你的时间线 -->
    <div id="timeline-section" 
         class="absolute bottom-0 right-0 z-20 w-[400px] p-16 transition-transform duration-700 ease-out translate-x-0">
      
      <div class="max-w-sm">
        <h2 class="text-[10px] uppercase tracking-[0.4em] text-gray-400 mb-20">Our Heritage</h2>

        <div class="relative border-l border-gray-800 ml-2 space-y-24">
          <!-- 节点 2026 -->
          <div class="group cursor-pointer ml-6" onmouseover="showBg('https://picsum.photos/1920/1080?1')" onmouseout="hideBg()">
            <span class="absolute -left-[5px] w-2.5 h-2.5 bg-gray-700 rounded-full group-hover:bg-amber-500 transition-colors"></span>
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-amber-600 mb-3">2026 - Present</h3>
            <p class="text-[11px] leading-loose text-gray-200 font-light tracking-wide">
              将AI与3D数字孪生技术引入传统木雕。在屏幕与木质纹理的博弈间，重构古老工艺的灵魂。
            </p>
          </div>
          <!-- 其他节点... -->
        </div>
      </div>
    </div>

    <!-- 右侧 Template -->
    <div class="absolute top-0 right-0 z-10">
      {{ template "official/section/right.html" . }}
    </div>

  </section>
</main>

<script>
  const timeline = document.getElementById('timeline-section');
  const bgLayer = document.getElementById('bg-layer');

  // Hover 交互：鼠标进入列表区域时，时间线向右隐藏
  timeline.addEventListener('mouseenter', () => {
    timeline.style.transform = 'translateX(85%)';
  });
  timeline.addEventListener('mouseleave', () => {
    timeline.style.transform = 'translateX(0)';
  });

  function showBg(url) {
      bgLayer.style.backgroundImage = `url('${url}')`;
      bgLayer.style.opacity = '1';
  }
  function hideBg() {
      bgLayer.style.opacity = '0';
  }
</script>
{{ end }}
