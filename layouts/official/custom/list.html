{{ define "main" }}

<!-- 主容器 Section -->
<section class="w-full h-screen bg-white overflow-hidden relative flex justify-end">


<div class="w-full mx-auto px-4 py-10">
  <div class="bg-white rounded-2xl shadow p-6 md:p-8">
    <h1 class="text-2xl md:text-3xl font-bold text-center text-amber-800 mb-6">发簪定制 · 刻字服务</h1>
    <p class="text-gray-600 text-center mb-8">填写下方信息，为您专属定制刻字发簪</p>

    <form action="#" method="post" class="space-y-5">

      <!-- 款式选择 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">选择发簪款式</label>
        <select class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
          <option>梨花木素簪</option>
          <option>鎏金雕花簪</option>
          <option>玉石流苏簪</option>
          <option>简约银簪</option>
        </select>
      </div>

      <!-- 正面刻字 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">正面刻字（限 10 字）</label>
        <input 
          type="text" 
          maxlength="10"
          placeholder="例如：平安喜乐 / 名字 / 诗句"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
        >
      </div>

      <!-- 反面刻字 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">反面刻字（可选，限 10 字）</label>
        <input 
          type="text" 
          maxlength="10"
          placeholder="可不填"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
        >
      </div>

      <!-- 字体选择 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">选择刻字字体</label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <label class="border rounded-lg p-2 flex items-center gap-2 cursor-pointer hover:bg-amber-50">
            <input type="radio" name="font" checked> 楷书
          </label>
          <label class="border rounded-lg p-2 flex items-center gap-2 cursor-pointer hover:bg-amber-50">
            <input type="radio" name="font"> 行书
          </label>
          <label class="border rounded-lg p-2 flex items-center gap-2 cursor-pointer hover:bg-amber-50">
            <input type="radio" name="font"> 小篆
          </label>
          <label class="border rounded-lg p-2 flex items-center gap-2 cursor-pointer hover:bg-amber-50">
            <input type="radio" name="font"> 隶书
          </label>
        </div>
      </div>

      <!-- 联系方式 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">您的手机号</label>
        <input 
          type="text" 
          placeholder="用于订单通知"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
        >
      </div>

      <!-- 备注 -->
      <div>
        <label class="block font-medium text-gray-700 mb-1">特殊要求 / 备注</label>
        <textarea 
          rows="3"
          placeholder="如：送礼包装、方向要求、祝福语排版等"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
        ></textarea>
      </div>

      <!-- 提交按钮 -->
      <button 
        type="submit"
        class="w-full bg-amber-700 hover:bg-amber-800 text-white font-medium py-2.5 rounded-lg transition"
      >
        提交定制订单
      </button>

    </form>
  </div>

  <p class="text-center text-gray-500 text-sm mt-4">
    刻字内容为定制，一经提交不予修改，请仔细核对
  </p>
</div>

  <!-- 右侧 Template -->
  <div id="timeline-section" class="transition-transform duration-700 ease-out">
    {{ template "official/section/right.html" . }}
  </div>
</section>

{{ end }}
