<!-- 导航栏 -->
<header>
  <nav
    class=" px-8 py-12 flex flex-col "
  >
    <!-- 顶部 Logo 区域 -->
    <div class="w-full">
      <a
        href="#"
        class="text-[1.6rem] tracking-[4px] font-medium text-blackDeep block mb-16"
      >
        <span class="text-gold">XINSIRUI</span>
      </a>

      <!-- 导航菜单：垂直排列列队 -->
      <div class="nav-menu flex flex-col gap-3 items-end font-['Century_Gothic',_'Futura',_sans-serif]">
        {{ range .Site.Menus.official.ByWeight }}
<a
  href="{{ .URL }}"
  class="text-gray-390 text-xs font-light tracking-[2px] uppercase transition-lux hover:text-gold hover:translate-x-1 transform block"
>
  {{ .Name }}
</a>
        {{ end }}
      </div>
    </div>

    <!-- 可选：底部版权或社交媒体区域（因为是侧边栏，底部留白可以利用起来） -->
    <div class="text-[0.75rem] text-gray-400 tracking-[1px]">
      © 2026 XINSIRUI
    </div>
  </nav>
</header>

<!-- 返回顶部按钮（可选） -->
<button
  id="back-to-top"
  class="fixed bottom-6 right-6 bg-secondary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-secondary/90 z-50"
>
  <i class="fa fa-arrow-up"></i>
</button>
