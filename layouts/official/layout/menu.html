<div class="fixed top-4 right-4 z-50 flex items-center gap-3">
  <span class="w-8 h-8 flex items-center justify-center">
    {{ template "official/icon/signin.html" . }}
  </span>
  <span class="w-8 h-8 flex items-center justify-center">
    {{ template "official/icon/signup.html" . }}
  </span>
  <span class="w-8 h-8 flex items-center justify-center  md:hidden">
    {{ template "official/icon/switch.html" . }}
  </span>
</div>
<!-- 菜单开关 -->
<input type="checkbox" id="menu-switch" class="hidden peer" />

<!-- 右侧边栏 -->
<div
  class="fixed top-0 right-0 h-screen w-[290px] md:w-[330px] dark:bg-gray-800 p-16 md:p-16 transition-transform duration-300 ease-in-out translate-x-full peer-checked:translate-x-0 md:translate-x-0 z-40"
>



{{ template "official/icon/logo.html" . }}
  <div
    class="nav-menu flex flex-col gap-3 items-end font-['initial',_'Futura',_sans-serif]"
  >




    {{ range .Site.Menus.official.ByWeight }}
    <a
      href="{{ .URL }}"
      class="text-gray-400 text-xs font-light tracking-[2px] uppercase transition-all hover:text-gray-900 font-medium hover:translate-x-1 transform block"
    >
      {{ .Name }}
    </a>
    {{ end }}
  </div>

  <!-- 底部社交 -->
  <div class="mt-auto pt-8">{{ template "official/layout/social.html" . }}</div>
</div>
