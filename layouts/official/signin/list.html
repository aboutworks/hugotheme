{{ define "main" }}
<section class="py-12 px-3 md:px-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-2xl p-8">
    <div class="flex flex-col items-center">
      {{ template "official/icon/logo.html" . }}
      <div class="text-center mb-8">
        <h1 class="text-[22px] font-semibold text-gray-900">{{ i18n "signin.title" }}</h1>
        <p class="text-sm text-gray-500 mt-1">{{ i18n "signin.subtitle" }}</p>
      </div>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ i18n "signin.username_or_email" }}
        </label>
        <input
          type="text"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black-500 focus:border-transparent"
          placeholder="{{ i18n "signin.placeholder_username" }}"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ i18n "signin.password" }}
        </label>
        <input
          type="password"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black-500 focus:border-transparent"
          placeholder="{{ i18n "signin.placeholder_password" }}"
        />
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
          <input
            type="checkbox"
            class="rounded text-black-600 focus:ring-black-500"
          />
          <span>{{ i18n "signin.remember_me" }}</span>
        </label>
        <a href="#" class="text-black-600 hover:underline">
          {{ i18n "signin.forgot_password" }}
        </a>
      </div>

      <button
        type="submit"
        class="w-full bg-black hover:bg-black-700 text-white py-2.5 rounded-lg transition font-medium"
      >
        {{ i18n "signin.sign_in" }}
      </button>

      <div class="text-center text-sm text-gray-500">
        {{ i18n "signin.no_account" }}
        <a href="/official/signup" class="text-black-600 font-medium hover:underline">
          {{ i18n "signin.sign_up" }}
        </a>
      </div>
    </form>
  </div>
</section>
{{ end }}
