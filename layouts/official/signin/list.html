{{ define "main" }}
<section class="py-12 px-4 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-2xl p-8">
    <div class="flex flex-row">
      <!-- 标题 -->
      {{ template "official/layout/logo.html" . }}
      <div class="text-center mb-8">
        <h1 class="text-[22px] font-semibold text-gray-900">欢迎登录</h1>
        <p class="text-sm text-gray-500 mt-1">请使用您的账号信息登录系统</p>
      </div>
    </div>

    <!-- 表单 -->
    <form class="space-y-5">
      <!-- 账号 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >账号 / 邮箱</label
        >
        <input
          type="text"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black-500 focus:border-transparent"
          placeholder="请输入账号或邮箱"
        />
      </div>

      <!-- 密码 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input
          type="password"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black-500 focus:border-transparent"
          placeholder="请输入密码"
        />
      </div>

      <!-- 记住我 + 忘记密码 -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
          <input
            type="checkbox"
            class="rounded text-black-600 focus:ring-black-500"
          />
          <span>记住我</span>
        </label>
        <a href="#" class="text-black-600 hover:underline">忘记密码？</a>
      </div>

      <!-- 登录按钮 -->
      <button
        type="submit"
        class="w-full bg-black hover:bg-black-700 text-white py-2.5 rounded-lg transition font-medium"
      >
        Sign in
      </button>

      <!-- 注册入口 -->
      <div class="text-center text-sm text-gray-500">
        还没有账号？
        <a href="/official/signup" class="text-black-600 font-medium hover:underline"
          >Sign up</a
        >
      </div>
    </form>
  </div>
</section>
{{ end }}
