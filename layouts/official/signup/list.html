{{ define "main" }}
<section
  class="py-12 px-4  min-h-screen flex items-center justify-center"
>
  <div class="w-full max-w-lg rounded-2xl shadow-sm p-8">
    <div class="text-center mb-6">
      <div class="flex flex-row">
        {{ template "official/layout/logo.html" . }}
        <div class="flex flex-col ">
          <h2 class="text-2xl font-bold text-gray-800">注册账号</h2>
          <p class="text-sm text-gray-500 mt-1">Create your account</p>
        </div>
      </div>
    </div>

    <form class="space-y-5">
      <!-- 用户名 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >用户名</label
        >
        <input
          type="text"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black-500 focus:border-transparent outline-none"
          placeholder="请输入用户名"
        />
      </div>

      <!-- 手机号 / 邮箱 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >手机号</label
        >
        <input
          type="tel"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black-500 focus:border-transparent outline-none"
          placeholder="请输入手机号"
        />
      </div>

      <!-- 验证码 -->
      <div class="flex gap-3">
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >验证码</label
          >
          <input
            type="text"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black-500 focus:border-transparent outline-none"
            placeholder="输入验证码"
          />
        </div>
        <button
          type="button"
          class="mt-6 whitespace-nowrap px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 text-sm"
        >
          获取验证码
        </button>
      </div>

      <!-- 密码 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >设置密码</label
        >
        <input
          type="password"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black-500 focus:border-transparent outline-none"
          placeholder="请输入密码"
        />
      </div>

      <!-- 协议 -->
      <div class="flex items-start gap-2 text-sm text-gray-600">
        <input type="checkbox" class="mt-1 rounded" />
        <span
          >我已阅读并同意 <a href="#" class="text-black-600">用户协议</a> 和
          <a href="#" class="text-black-600">隐私政策</a></span
        >
      </div>

      <!-- 注册按钮 -->
      <button
        type="submit"
        class="w-full bg-black-1000 hover:bg-black-700 text-white py-2.5 rounded-lg transition font-medium"
      >
        Sign Up
      </button>

      <!-- 去登录 -->
      <div class="text-center text-sm text-gray-500">
        已有账号？
        <a href="/official/signin" class="text-black-600 font-medium hover:underline"
          >Sign In</a
        >
      </div>
    </form>
  </div>
</section>
{{ end }}
