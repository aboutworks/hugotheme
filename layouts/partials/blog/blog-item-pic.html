<div
  class="flex flex-row bg-white dark:bg-gray-800 rounded-xl shadow-md hover:shadow-lg transition-all duration-300 overflow-hidden"
>
  <!-- 左侧：1:1 书籍封面 -->
  <div class="w-48 aspect-square shrink-0">
    <a href="{{.Permalink }}" class="block w-full h-full">
      <img
        src="{{.Image}}"
        alt="{{.Title }}"
        class="w-full h-full object-cover"
        loading="lazy"
      />
    </a>
  </div>

  <!-- 右侧：内容区域 -->
  <div class="flex-1 flex flex-col justify-between p-5">
    <!-- 顶部：标题 + UUID -->
    <div class="flex flex-col gap-2 mb-2">
      <h3
        class="text-lg font-bold text-gray-900 dark:text-white line-clamp-2 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
        onclick="clickaddcount('{{ .Uuid }}')"
      >
        <a href="{{.Permalink }}">{{.Title }}</a>
      </h3>
      <span
        class="text-gray-900 dark:text-white text-xs px-2.5 py-1 rounded-full font-medium authid_uuid_{{ .Uuid }}"
      >
        {{ .Uuid }}
        <i class="fa fa-fire ml-1"></i>
      </span>
    </div>

    <!-- 描述 -->
    <p class="text-gray-600 dark:text-gray-400 text-sm mb-3 line-clamp-3">
      {{.Weight }}, {{.Desc }}
    </p>

    <!-- 标签 -->
    <div class="flex flex-wrap gap-2 mb-4">
      <span
        class="px-2 py-0.5 bg-blue-500 dark:bg-blue-600 text-white rounded-full text-xs font-medium"
        >科技</span
      >
      {{ range.Tags }}
      <span
        class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-full text-xs hover:bg-gray-200 dark:hover-bg-gray-600 transition-colors"
        >{{ . }}</span
      >
      {{ end }}
      <span
        class="px-2 py-0.5 bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 rounded-full text-xs font-medium"
        >+1</span
      >
    </div>

    <!-- 底部：作者 + 时间 + 阅读量 -->
    <div
      class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-700 mt-auto"
    >
      <div class="flex items-center">
        <img
          src="posts/assets资产/head.jpg"
          alt="李明"
          class="w-7 h-7 rounded-full object-cover mr-2 border border-gray-200 dark:border-gray-600"
          loading="lazy"
        />
        <span class="text-sm text-gray-700 dark:text-gray-300 font-medium"
          >李明</span
        >
      </div>
      <div class="flex items-center text-xs text-gray-500 dark:text-gray-400">
        <span class="mr-3"
          ><i class="fa fa-calendar-o mr-1"></i>{{.Date.Format "2006-01-02 15:04:05" }}</span
        >
        <span>
          <i class="fa fa-eye mr-1"></i>
          <span id="eyescount_{{.Uuid}}">-</span>
        </span>
      </div>
    </div>
  </div>
</div>

  // 加载点击数
  function loadCount() {
    console.log("加载点击数");
    document.querySelectorAll("[id^='eyescount_']").forEach((span) => {
      const uuid = span.id.replace("eyescount_", "");
      fetch(`https://handle.lehuye.com/datas/getClickCount?uuid=${uuid}`, {
        method: "GET",
        headers: {
          "Content-Type": "application/json",
          authorization: "keebone",
        },
      })
        .then((res) => res.json())
        .then((data) => {
          span.innerText = data.count ?? 0;
        })
        .catch((err) => console.error("Error fetching click count:", err));
    });
  }

  // 增加点击数
  function clickaddcount(uuid) {
    console.log("增加点击数");
    fetch(`https://handle.lehuye.com/datas/incrementClickCount`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        authorization: "keebone",
      },
      body: JSON.stringify({ uuid }),
    })
      .then((res) => res.json())
      .then((data) => {
        console.log(data);
        const span = document.getElementById(`eyescount_${uuid}`);
        if (span) {
          span.innerText = data.count ?? 0;
        }
      })
      .catch((err) => console.error("Error updating click count:", err));
  }
</script>
