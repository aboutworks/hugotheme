<!-- 评论区 -->
<!-- 评论区 -->
<div class="comment-section space-y-8">
  <!-- 评论标题 -->
  <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">评论 (12)</h2>

  <!-- 评论排序 -->
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-2">
      <span class="text-gray-600 dark:text-gray-400">排序：</span>
      <button id="sort-latest" class="px-3 py-1 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-md text-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">最新</button>
      <button id="sort-popular" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-md text-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-gray-400 dark:focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">最热</button>
    </div>
  </div>

  <!-- 评论表单 -->
  <div class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 py-8 transition-colors duration-300 rounded-lg shadow-sm">
    <h3 class="text-lg font-semibold mb-6 text-gray-900 dark:text-gray-100">发表评论</h3>
    <form id="comment-form" class="space-y-4">
      <!-- 姓名和邮箱行 -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- 姓名输入框 -->
        <div class="space-y-1">
          <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">姓名</label>
          <input type="text" id="name" name="name"
            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition-colors duration-200"
            required>
        </div>
        <!-- 邮箱输入框 -->
        <div class="space-y-1">
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">邮箱 (不会公开)</label>
          <input type="email" id="email" name="email"
            class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition-colors duration-200"
            required>
        </div>
      </div>
      <!-- 评论内容输入框 -->
      <div class="space-y-1">
        <label for="content" class="block text-sm font-medium text-gray-700 dark:text-gray-300">评论内容</label>
        <textarea id="content" name="content" rows="4"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-white transition-colors duration-200 resize-none"
          required></textarea>
      </div>
      <!-- 提交按钮 -->
      <div class="flex justify-end">
        <button type="submit"
          class="px-6 py-2 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900">
          提交评论
        </button>
      </div>
    </form>
  </div>

  <!-- 评论列表 -->
  <div class="comment-list space-y-4" id="comment-list">
    <!-- 评论将由JavaScript动态生成 -->
  </div>

  <!-- 评论分页 -->
  <div class="comment-pagination flex justify-center py-4" id="comment-pagination">
    <!-- 分页按钮将由JavaScript动态生成 -->
  </div>
</div>
